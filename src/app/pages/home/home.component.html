<section class="home-page">
  <div class="home-shell">
    <div class="hero">
      <p class="eyebrow">HOME</p>
      <h1>Bienvenue sur votre espace e-commerce.</h1>
      <ng-container *ngIf="currentUser$ | async as currentUser">
        <p class="subtitle">
          Vous etes connecte {{ currentUser.firstName }} {{ currentUser.lastName }}.
          Utilisez la navigation de l'application pour acceder
          au panier, aux produits et a la wishlist.
        </p>
      </ng-container>
    </div>

    <div class="actions">
      <button type="button" class="button" (click)="logout()">
        Deconnexion
      </button>

      <button *ngIf="isAdmin$ | async" type="button" class="button">
        <a routerLink="/products-config">Gerer les produits</a>
      </button>

      <button type="button" class="button">
        <a routerLink="/products-list">Voir les produits</a>
      </button>

      <button type="button" class="button">
        <a routerLink="/cart">Voir le panier</a>
      </button>

      <button type="button" class="button">
        <a routerLink="/wishlist">Voir la wishlist</a>
      </button>
    </div>
  </div>
</section>
