<section class="products-config-page">
  <div class="topbar">
    <div class="toolbar-actions">
      <a class="icon-button" routerLink="/home" aria-label="Retour accueil">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 5L8 12L15 19" />
          <path d="M9 12H21" />
        </svg>
      </a>

      <button type="button" class="icon-button" aria-label="Supprimer">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 7H20" />
          <path d="M9 7V4H15V7" />
          <path d="M7 7V19C7 20.1 7.9 21 9 21H15C16.1 21 17 20.1 17 19V7" />
          <path d="M10 11V17" />
          <path d="M14 11V17" />
        </svg>
      </button>

      <button type="button" class="icon-button" aria-label="Modifier">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 20L8.5 19L19 8.5L15.5 5L5 15.5L4 20Z" />
          <path d="M13.5 7L17 10.5" />
        </svg>
      </button>
    </div>
  </div>

  <div class="cards-grid" *ngIf="cards.length > 0; else emptyState">
    <article
      *ngFor="let card of cards"
      class="product-card"
      [class.product-card--create]="card.isCreateCard">
      <ng-container *ngIf="card.isCreateCard; else defaultCard">
        <div class="create-card-content">
          <span class="plus-circle">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5V19" />
              <path d="M5 12H19" />
            </svg>
          </span>
          <span>{{ card?.title }}</span>
        </div>
      </ng-container>

      <ng-template #defaultCard>
        <h2>{{ card?.title }}</h2>
      </ng-template>
    </article>
  </div>

  <ng-template #emptyState>
    <p class="empty-state">Aucun produit trouve. Utilisez le bouton "+" pour en ajouter un.</p>
  </ng-template>
</section>
