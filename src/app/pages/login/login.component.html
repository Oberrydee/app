<section class="auth-page">
  <div class="auth-shell">
    <div class="auth-intro">
      <p class="eyebrow">E-COM-TEST</p>
      <h1>Connectez-vous pour accéder à votre espace.</h1>
      <p class="subtitle">
        L'accès au site est réservé aux utilisateurs authentifiés.
      </p>
    </div>

    <div class="auth-card">
      <div class="mode-switch" role="tablist" aria-label="Choix du formulaire d'authentification">
        <button
          type="button"
          class="mode-button"
          [class.active]="mode === 'login'"
          (click)="setMode('login')">
          Se connecter
        </button>
        <button
          type="button"
          class="mode-button"
          [class.active]="mode === 'register'"
          (click)="setMode('register')">
          Créer un compte
        </button>
      </div>

      <p *ngIf="successMessage" class="feedback success">{{ successMessage }}</p>
      <p *ngIf="errorMessage" class="feedback error">{{ errorMessage }}</p>

      <form
        *ngIf="mode === 'login'"
        class="auth-form"
        [formGroup]="loginForm"
        (ngSubmit)="submit()">
        <label class="field">
          <span>Email</span>
          <input type="email" formControlName="email" placeholder="vous@example.com">
          <small *ngIf="hasError('login', 'email', 'required')">L'email est requis.</small>
          <small *ngIf="hasError('login', 'email', 'email')">Saisissez un email valide.</small>
        </label>

        <label class="field">
          <span>Mot de passe</span>
          <input type="password" formControlName="password" placeholder="Votre mot de passe">
          <small *ngIf="hasError('login', 'password', 'required')">Le mot de passe est requis.</small>
        </label>

        <button type="submit" class="submit-button" [disabled]="loading">
          {{ loading ? 'Connexion...' : 'Se connecter' }}
        </button>
      </form>

      <form
        *ngIf="mode === 'register'"
        class="auth-form"
        [formGroup]="registerForm"
        (ngSubmit)="submit()">
        <label class="field">
          <span>Prénom</span>
          <input type="text" formControlName="firstName" placeholder="Jane">
          <small *ngIf="hasError('register', 'firstName', 'required')">Le prénom est requis.</small>
        </label>

        <label class="field">
          <span>Nom</span>
          <input type="text" formControlName="lastName" placeholder="Doe">
          <small *ngIf="hasError('register', 'lastName', 'required')">Le nom est requis.</small>
        </label>

        <label class="field">
          <span>Email</span>
          <input type="email" formControlName="email" placeholder="vous@example.com">
          <small *ngIf="hasError('register', 'email', 'required')">L'email est requis.</small>
          <small *ngIf="hasError('register', 'email', 'email')">Saisissez un email valide.</small>
        </label>

        <label class="field">
          <span>Mot de passe</span>
          <input type="password" formControlName="password" placeholder="6 caractères minimum">
          <small *ngIf="hasError('register', 'password', 'required')">Le mot de passe est requis.</small>
          <small *ngIf="hasError('register', 'password', 'minlength')">
            Le mot de passe doit contenir au moins 6 caractères.
          </small>
        </label>

        <button type="submit" class="submit-button" [disabled]="loading">
          {{ loading ? 'Création...' : 'Créer un compte' }}
        </button>
      </form>
    </div>
  </div>
</section>
